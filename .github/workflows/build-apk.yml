name: Build V2 HHT APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/V2Retail_at_456_keystore
          ls -lh /tmp/V2Retail_at_456_keystore

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: /tmp/V2Retail_at_456_keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect and verify APK
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          echo "APK: $APK  size: $(du -sh $APK)"
          # Verify signature using keytool (available on all JDK installs)
          unzip -p "$APK" META-INF/*.RSA 2>/dev/null | keytool -printcert 2>/dev/null | grep -E "Owner|SHA256|Validity" || true
          # Also check with jarsigner
          jarsigner -verify "$APK" -verbose 2>&1 | head -5 || true
          cp "$APK" V2_HHT_Azure_Release.apk
          echo "Final APK size: $(du -sh V2_HHT_Azure_Release.apk)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2-HHT-Azure-Release
          path: V2_HHT_Azure_Release.apk

      - name: Get version name
        id: version
        run: |
          VER=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Push to R2 CDN
        run: |
          pip install boto3 -q
          python3 - << 'PYEOF'
          import boto3, os
          s3 = boto3.client(
              's3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY'],
              aws_secret_access_key=os.environ['R2_SECRET_KEY'],
              region_name='auto'
          )
          s3.upload_file(
              'V2_HHT_Azure_Release.apk', 'nubo', 'hht/V2_HHT_Azure_Release.apk',
              ExtraArgs={'ContentType': 'application/vnd.android.package-archive'}
          )
          size_mb = os.path.getsize('V2_HHT_Azure_Release.apk') // 1024 // 1024
          print(f"Uploaded {size_mb}MB to R2 → assets.eatnubo.com/hht/V2_HHT_Azure_Release.apk")
          PYEOF
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: 'V2 HHT v${{ steps.version.outputs.version }} Build ${{ github.run_number }}'
          body: |
            Version: ${{ steps.version.outputs.version }}
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            CDN: https://assets.eatnubo.com/hht/V2_HHT_Azure_Release.apk
          files: V2_HHT_Azure_Release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

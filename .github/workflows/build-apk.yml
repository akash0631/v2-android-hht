name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles("**/*.gradle*") }}

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk              app/build/outputs/apk/release/V2_HHT_Azure_Release.apk 2>/dev/null ||           mv app/build/outputs/apk/release/app-release.apk              app/build/outputs/apk/release/V2_HHT_Azure_Release.apk 2>/dev/null || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: V2-HHT-Azure-Release
          path: app/build/outputs/apk/release/V2_HHT_Azure_Release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v11.83-azure-${{ github.run_number }}
          name: "V2 HHT v11.83 — Azure Build #${{ github.run_number }}"
          files: app/build/outputs/apk/release/V2_HHT_Azure_Release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
